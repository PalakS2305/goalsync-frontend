<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoalSync — Login</title>
  <link rel="stylesheet" href="css/global.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
      color: white;
    }

    .login-brand h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .login-brand p {
      opacity: 0.7;
      font-size: 0.95rem;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .login-card h2 {
      color: #0f3460;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.825rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .form-group input:focus {
      border-color: #0f3460;
      box-shadow: 0 0 0 3px rgba(15,52,96,0.1);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .login-btn:hover   { background: #1a4a8a; }
    .login-btn:active  { transform: scale(0.98); }
    .login-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-box.show { display: flex; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: #9ca3af;
    }

    .demo-creds {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .demo-creds p {
      font-size: 0.78rem;
      font-weight: 700;
      color: #0369a1;
      margin-bottom: 6px;
    }

    .demo-creds-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #374151;
      padding: 2px 0;
    }

    .demo-creds-row span:last-child {
      color: #6b7280;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="login-brand">
      <h1>🎯 GoalSync</h1>
      <p>Goal Setting & Tracking Portal</p>
    </div>

    <div class="login-card">
      <h2>Welcome back 👋</h2>

      <!-- Demo credentials -->
      <div class="demo-creds">
        <p>🔑 Demo Credentials</p>
        <div class="demo-creds-row">
          <span>Employee</span>
          <span>employee@goalsync.com / emp123</span>
        </div>
        <div class="demo-creds-row">
          <span>Manager</span>
          <span>manager@goalsync.com / manager123</span>
        </div>
        <div class="demo-creds-row">
          <span>Admin</span>
          <span>admin@goalsync.com / admin123</span>
        </div>
      </div>

      <!-- Error box -->
      <div class="error-box" id="errorBox">
        <span>⚠️</span>
        <span id="errorMsg"></span>
      </div>

      <div class="form-group">
        <label for="email">Work Email</label>
        <input type="email" id="email"
               placeholder="you@company.com"
               autocomplete="email"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password"
               placeholder="Enter your password"/>
      </div>

      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        Login →
      </button>

      <p class="login-footer">
        GoalSync v1.0 &nbsp;·&nbsp; Built with ❤️
      </p>
    </div>

  </div>

  <script src="js/auth.js"></script>

</body>
</html>
