<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoalSync — Admin Panel</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/goals.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link rel="stylesheet" href="../css/global.css"/>
</head>
<body class="dashboard-body">

  <nav class="navbar">
    <h2>🎯 GoalSync</h2>
    <div class="navbar-right">
      <span id="navUserName">Loading...</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-content">

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('users')">
        👥 Users
      </button>
      <button class="tab-btn" onclick="switchTab('goals')">
        🎯 All Goals
      </button>
      <button class="tab-btn" onclick="switchTab('shared')">
        📢 Push Shared Goal
      </button>
      <button class="tab-btn" onclick="switchTab('audit')">
        📋 Audit Logs
      </button>
      <button class="tab-btn" 
        onclick="window.location.href='analytics.html'">
  📈 Analytics
</button>
    </div>

    <!-- USERS TAB -->
    <div id="tab-users" class="tab-content active">
      <div class="page-header">
        <h2>User Management</h2>
        <button class="btn-primary" onclick="openUserModal()">
          + Add User
        </button>
      </div>
      <div id="usersList">Loading...</div>
    </div>

    <!-- GOALS TAB -->
    <div id="tab-goals" class="tab-content">
      <div class="page-header">
  <h2>All Goals</h2>
  <button class="btn-primary" onclick="exportCSV()">
    ⬇️ Export CSV
  </button>
</div>
      <div id="allGoalsList">Loading...</div>
    </div>

    <!-- SHARED GOAL TAB -->
    <div id="tab-shared" class="tab-content">
      <div class="page-header">
        <h2>Push Shared Goal</h2>
      </div>
      <div class="shared-goal-form">

        <div class="form-group">
          <label>Goal Title *</label>
          <input type="text" id="sgTitle" 
                 placeholder="e.g. Annual Safety Training"/>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="sgDesc" rows="2" 
                    placeholder="Details about this shared goal"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Thrust Area</label>
            <select id="sgThrust">
              <option value="Compliance">Compliance</option>
              <option value="People Development">People Development</option>
              <option value="Quality">Quality</option>
              <option value="Innovation">Innovation</option>
              <option value="Revenue Growth">Revenue Growth</option>
            </select>
          </div>
          <div class="form-group">
            <label>UoM Type *</label>
            <select id="sgUom">
              <option value="min">Higher is Better</option>
              <option value="max">Lower is Better</option>
              <option value="percentage_min">% Higher is Better</option>
              <option value="zero">Zero Target</option>
              <option value="timeline">Timeline</option>
            </select>
          </div>
          <div class="form-group">
            <label>Target Value</label>
            <input type="number" id="sgTarget" placeholder="e.g. 100"/>
          </div>
        </div>

        <div class="form-group">
          <label>Select Employees to Push To *</label>
          <div id="employeeCheckboxes" class="checkbox-list">
            Loading employees...
          </div>
        </div>

        <button class="btn-primary" onclick="pushSharedGoal()" 
                style="margin-top:8px">
          📢 Push to Selected Employees
        </button>

      </div>
    </div>

    <!-- AUDIT LOG TAB -->
    <div id="tab-audit" class="tab-content">
      <div class="page-header">
        <h2>Audit Logs</h2>
      </div>
      <div id="auditList">Loading...</div>
    </div>

  </div>

  <!-- Add User Modal -->
  <div class="modal-overlay" id="userModal" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Add New User</h3>
        <button class="modal-close" onclick="closeUserModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="newName" placeholder="John Doe"/>
          </div>
          <div class="form-group">
            <label>Role *</label>
            <select id="newRole">
              <option value="employee">Employee</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="newEmail" 
                 placeholder="john@company.com"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password *</label>
            <input type="password" id="newPassword" 
                   placeholder="Min 6 characters"/>
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="newDept" 
                   placeholder="e.g. Engineering"/>
          </div>
        </div>
        <div class="form-group">
          <label>Manager (for employees)</label>
          <select id="newManager">
            <option value="">No manager</option>
          </select>
        </div>
        <div class="error-box" id="userModalError" 
             style="display:none">
          <span id="userModalErrorText"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeUserModal()">
          Cancel
        </button>
        <button class="btn-primary" onclick="createUser()">
          Create User
        </button>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>

</body>
</html>
