<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoalSync — Quarterly Check-in</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/goals.css"/>
  <link rel="stylesheet" href="../css/quarterly.css"/>
  <link rel="stylesheet" href="../css/global.css"/>
</head>
<body class="dashboard-body">

  <nav class="navbar">
    <h2>🎯 GoalSync</h2>
    <div class="navbar-right">
      <span id="navUserName">Loading...</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-content">

    <div class="page-header">
      <div>
        <h1>Quarterly Check-in</h1>
        <p>Log your actual achievements for each quarter.</p>
      </div>
      <button class="btn-secondary"
        onclick="window.location.href='employee-dashboard.html'">
        ← Back
      </button>
    </div>

    <!-- Quarter Selector -->
    <div class="quarter-selector">
      <button class="quarter-btn active" onclick="selectQuarter('Q1')">
        Q1 (Jul)
      </button>
      <button class="quarter-btn" onclick="selectQuarter('Q2')">
        Q2 (Oct)
      </button>
      <button class="quarter-btn" onclick="selectQuarter('Q3')">
        Q3 (Jan)
      </button>
      <button class="quarter-btn" onclick="selectQuarter('Q4')">
        Q4 (Apr)
      </button>
    </div>

    <!-- Goals Achievement Table -->
    <div id="quarterlyContent">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <h3>Loading your goals...</h3>
      </div>
    </div>

  </div>

  <!-- Log Achievement Modal -->
  <div class="modal-overlay" id="logModal" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="logModalTitle">Log Achievement</h3>
        <button class="modal-close" onclick="closeLogModal()">✕</button>
      </div>
      <div class="modal-body">
        <p id="logGoalInfo" style="color:#6b7280; margin-bottom:16px;">
        </p>
        <div class="form-group">
          <label id="logValueLabel">Actual Achievement *</label>
          <input type="number" id="logActualValue" 
                 placeholder="Enter your actual value" step="0.01"/>
        </div>
        <div class="form-group">
          <label>Goal Status</label>
          <select id="logGoalStatus">
            <option value="on_track">On Track</option>
            <option value="completed">Completed</option>
            <option value="not_started">Not Started</option>
          </select>
        </div>
        <div class="error-box" id="logError" style="display:none">
          <span id="logErrorText"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeLogModal()">
          Cancel
        </button>
        <button class="btn-primary" onclick="saveAchievement()">
          Save Achievement
        </button>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/quarterly.js"></script>

</body>
</html>
